services:
  mysql:
    image: mysql:8.0
    container_name: officeflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: officeflow
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - officeflow-mysql-data:/var/lib/mysql
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4

  redis:
    image: redis:7.2
    container_name: officeflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - officeflow-redis-data:/data

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: officeflow-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - officeflow-nacos-data:/home/nacos/data

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: officeflow-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: officeflow_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - officeflow-pgvector-data:/var/lib/postgresql/data

  elasticsearch:
    build: ./docker/elasticsearch
    container_name: officeflow-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - officeflow-es-data:/usr/share/elasticsearch/data

volumes:
  officeflow-mysql-data:
  officeflow-redis-data:
  officeflow-nacos-data:
  officeflow-pgvector-data:
  officeflow-es-data:
