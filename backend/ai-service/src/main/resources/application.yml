server:
  port: 9106

# ---- Document auto-loading ----
app:
  document:
    path: docs/pdf

spring:
  application:
    name: ai-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml

  # ---- DashScope (Tongyi Qianwen) ----
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          top-p: 0.8
      embedding:
        options:
          model: text-embedding-v3

  # ---- Redis (rate limiting) ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  # ---- PostgreSQL DataSource (pgvector) ----
  datasource:
    url: jdbc:postgresql://localhost:5433/officeflow_ai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-pgvector.sql
